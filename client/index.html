  <script>
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual'
    var _sk = function() { return location.pathname + location.search }
    var _ss = function() {
      try { sessionStorage.setItem('_msf_' + _sk(), window.scrollY) } catch (e) {}
    }
    document.addEventListener('scroll', _ss, { passive: true })
    document.addEventListener('click', function(e) {
      var a = e.target.closest('a')
      if (a && a.href && a.origin === window.location.origin) _ss()
    }, { capture: true })
    setTimeout(_ss, 0)
    window.addEventListener('popstate', function() {
      requestAnimationFrame(function() {
        var pos = sessionStorage.getItem('_msf_' + _sk())
        if (pos && Number(pos) > 0) {
          var fn = function() {
            if (document.documentElement.scrollHeight > Number(pos) + 100) {
              document.documentElement.scrollTop = Number(pos)
              return true
            }
            return false
          }
          if (!fn()) {
            var t = 0, id = setInterval(function() {
              t++; if (fn() || t > 30) clearInterval(id)
            }, 100)
          }
        } else {
          document.documentElement.scrollTop = 0
        }
      })
    })
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
